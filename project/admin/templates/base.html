<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="{% if user %}is-authenticated{% else %}is-login{% endif %}">
    {% if user %}
    {% set path = request.url.path %}
    <nav class="sidebar">
        <div class="nav-brand">
            <span class="brand-mark">
                <img src="/static/moroz-solntse-logo.png" alt="Мороз и Солнце">
            </span>
            <span class="brand-title">
                <span>Мороз и Солнце | bot</span>
            </span>
        </div>
        <div class="nav-links">
            <a href="/" class="{% if path == '/' or path.startswith('/chats') %}active{% endif %}">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 7.5h14v8H10l-5 4v-12Z"/></svg></span>Диалоги
            </a>
            <a href="/stats" class="{% if path.startswith('/stats') %}active{% endif %}">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 18h14"/><path d="M7 18v-5"/><path d="M12 18V7"/><path d="M17 18v-8"/></svg></span>Статистика
            </a>
            <a href="/prompt/" class="{% if path.startswith('/prompt') %}active{% endif %}">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M8 14a6 6 0 1 1 8 0c-.8.7-1.2 1.4-1.2 2.3H9.2c0-.9-.4-1.6-1.2-2.3Z"/><path d="M12 8v4"/><path d="M10 10h4"/></svg></span>Промпт
            </a>
            <a href="/eval/" class="{% if path.startswith('/eval') %}active{% endif %}">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 20h16"/><path d="M6 16V8"/><path d="M12 16V4"/><path d="M18 16v-6"/></svg></span>Evaluations
            </a>
            <a href="/review/evals" class="{% if path.startswith('/review') %}active{% endif %}">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 5h16v14H4Z"/><path d="M8 9h8"/><path d="M8 13h5"/><path d="m15 17 2 2 4-4"/></svg></span>Review кейсов
            </a>
            <a href="/bot-control/" class="{% if path.startswith('/bot-control') %}active{% endif %}">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/><path d="M19.4 15a1.8 1.8 0 0 0 .4 2l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.8 1.8 0 0 0-2-.4 1.8 1.8 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.8 1.8 0 0 0-1-1.6 1.8 1.8 0 0 0-2 .4l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.8 1.8 0 0 0 .4-2 1.8 1.8 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.8 1.8 0 0 0 1.6-1 1.8 1.8 0 0 0-.4-2l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.8 1.8 0 0 0 2 .4 1.8 1.8 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.8 1.8 0 0 0 1 1.6 1.8 1.8 0 0 0 2-.4l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.8 1.8 0 0 0-.4 2 1.8 1.8 0 0 0 1.6 1H21a2 2 0 1 1 0 4h-.1a1.8 1.8 0 0 0-1.5 1Z"/></svg></span>Управление
            </a>
            <a href="/logs/" class="{% if path.startswith('/logs') %}active{% endif %}">
                <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 5h16v14H4Z"/><path d="m8 9 3 3-3 3"/><path d="M13 15h4"/></svg></span>Логи
            </a>
        </div>
        <div class="nav-bottom">
        <div class="nav-status" id="llm-status">
            <span class="llm-pill llm-pill--unknown" id="llm-main" title="Загрузка...">Main: …</span>
            <span class="llm-pill llm-pill--unknown" id="llm-reserve" title="Загрузка...">Reserve: …</span>
        </div>
        <div class="nav-user">
            <span>{{ user }}</span>
            <a href="/logout" class="logout">Выйти</a>
        </div>
        </div>
    </nav>
    <script>
    (function() {
        const STATE = {
            ok:       { cls: 'llm-pill--ok',       label: 'OK' },
            depleted: { cls: 'llm-pill--depleted', label: 'Funds depleted' },
            unknown:  { cls: 'llm-pill--unknown',  label: '—' },
        };
        function fmtTs(ts) {
            if (!ts) return 'нет данных';
            const d = new Date(ts * 1000);
            return d.toLocaleString('ru-RU', { hour12: false });
        }
        function render(elId, prefix, info, configured) {
            const el = document.getElementById(elId);
            if (!el) return;
            if (configured === false) {
                el.className = 'llm-pill llm-pill--unknown';
                el.textContent = prefix + ': не настроен';
                el.title = 'RESERVE_API_KEY/RESERVE_MODEL пусты в .env';
                return;
            }
            const status = (info && info.status) || 'unknown';
            const s = STATE[status] || STATE.unknown;
            el.className = 'llm-pill ' + s.cls;
            el.textContent = prefix + ': ' + s.label;
            const model = info && info.model ? info.model : '—';
            const detail = info && info.detail ? '\n' + info.detail : '';
            el.title = 'Модель: ' + model + '\nОбновлено: ' + fmtTs(info && info.ts) + detail;
        }
        async function poll() {
            try {
                const r = await fetch('/api/llm-status', { credentials: 'same-origin' });
                if (!r.ok) return;
                const data = await r.json();
                render('llm-main', 'Main', data.main, true);
                render('llm-reserve', 'Reserve', data.reserve, data.reserve_configured);
            } catch (e) { /* тихо */ }
        }
        poll();
        setInterval(poll, 30000);
    })();
    </script>
    {% endif %}
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
