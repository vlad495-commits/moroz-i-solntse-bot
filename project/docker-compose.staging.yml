services:
  bot:
    image: "moroz-staging-bot:${STAGING_IMAGE_TAG:?set STAGING_IMAGE_TAG}"
    ports:
      - "127.0.0.1:${STAGING_BOT_PORT:-18081}:8081"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          raise SystemExit(0 if urllib.request.urlopen(
          'http://127.0.0.1:8081/openapi.json', timeout=3).status == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  worker:
    image: "moroz-staging-worker:${STAGING_IMAGE_TAG:?set STAGING_IMAGE_TAG}"

  migrate:
    image: "moroz-staging-migrate:${STAGING_IMAGE_TAG:?set STAGING_IMAGE_TAG}"

  cutover:
    image: "moroz-staging-migrate:${STAGING_IMAGE_TAG:?set STAGING_IMAGE_TAG}"

  admin:
    profiles: ["disabled-in-staging"]
    ports: !reset []

  scheduler:
    profiles: ["disabled-in-staging"]

  staging-webhook:
    profiles: ["staging-tools"]
    image: "moroz-staging-bot:${STAGING_IMAGE_TAG:?set STAGING_IMAGE_TAG}"
    entrypoint: ["python", "/app/ops/staging.py", "webhook"]
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?set TELEGRAM_BOT_TOKEN}
      STAGING_TELEGRAM_BOT_ID: ${STAGING_TELEGRAM_BOT_ID:?set STAGING_TELEGRAM_BOT_ID}
      STAGING_PUBLIC_URL: ${STAGING_PUBLIC_URL:?set STAGING_PUBLIC_URL}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:?set TELEGRAM_WEBHOOK_SECRET}
    volumes:
      - ./ops:/app/ops:ro

  staging-smoke:
    profiles: ["staging-tools"]
    image: "moroz-staging-bot:${STAGING_IMAGE_TAG:?set STAGING_IMAGE_TAG}"
    entrypoint: ["python", "/app/ops/staging.py", "smoke"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      STAGING_PUBLIC_URL: ${STAGING_PUBLIC_URL:?set STAGING_PUBLIC_URL}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:?set TELEGRAM_WEBHOOK_SECRET}
    volumes:
      - ./ops:/app/ops:ro
      - ../tmp:/state:rw

  caddy-init:
    profiles: ["staging-ingress"]
    image: caddy:2.11.4
    user: "0:0"
    restart: "no"
    network_mode: none
    read_only: true
    cap_drop: ["ALL"]
    cap_add: ["CHOWN"]
    security_opt: ["no-new-privileges:true"]
    entrypoint: ["/bin/sh", "-c"]
    command: ["chown -R 10001:10001 /data/caddy /config/caddy"]
    volumes:
      - staging_caddy_data:/data/caddy
      - staging_caddy_config:/config/caddy

  caddy:
    profiles: ["staging-ingress"]
    image: caddy:2.11.4
    user: "10001:10001"
    entrypoint:
      - /bin/sh
      - -c
      - >-
        set -eu;
        cp /usr/bin/caddy /tmp/caddy;
        if [ "$${1:-}" = caddy ]; then shift; fi;
        exec /tmp/caddy "$$@"
      - --
    command:
      - caddy
      - run
      - --config
      - /etc/caddy/Caddyfile
      - --adapter
      - caddyfile
    restart: unless-stopped
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    environment:
      STAGING_DOMAIN: ${STAGING_DOMAIN:?set STAGING_DOMAIN}
    ports:
      - "80:8080"
      - "443:8443"
      - "443:8443/udp"
    volumes:
      - ./ops/staging/Caddyfile:/etc/caddy/Caddyfile:ro
      - staging_caddy_data:/data/caddy
      - staging_caddy_config:/config/caddy
    tmpfs:
      - /tmp:exec
    depends_on:
      bot:
        condition: service_healthy
      caddy-init:
        condition: service_completed_successfully
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "3"
    healthcheck:
      test: ["CMD", "/tmp/caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  staging_caddy_data:
  staging_caddy_config:
