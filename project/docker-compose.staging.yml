services:
  bot:
    image: "moroz-staging-bot:${STAGING_IMAGE_TAG:?set STAGING_IMAGE_TAG}"
    ports:
      - "127.0.0.1:${STAGING_BOT_PORT:-18081}:8081"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          raise SystemExit(0 if urllib.request.urlopen(
          'http://127.0.0.1:8081/openapi.json', timeout=3).status == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  worker:
    image: "moroz-staging-worker:${STAGING_IMAGE_TAG:?set STAGING_IMAGE_TAG}"

  migrate:
    image: "moroz-staging-migrate:${STAGING_IMAGE_TAG:?set STAGING_IMAGE_TAG}"

  cutover:
    image: "moroz-staging-migrate:${STAGING_IMAGE_TAG:?set STAGING_IMAGE_TAG}"

  admin:
    profiles: ["disabled-in-staging"]
    ports: !reset []

  scheduler:
    profiles: ["disabled-in-staging"]

  caddy:
    profiles: ["staging-ingress"]
    image: caddy:2.11.4
    user: "10001:10001"
    entrypoint:
      - /bin/sh
      - -c
      - >-
        set -eu;
        cp /usr/bin/caddy /tmp/caddy;
        if [ "$${1:-}" = caddy ]; then shift; fi;
        exec /tmp/caddy "$$@"
      - --
    restart: unless-stopped
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    environment:
      STAGING_DOMAIN: ${STAGING_DOMAIN:?set STAGING_DOMAIN}
    ports:
      - "80:8080"
      - "443:8443"
      - "443:8443/udp"
    volumes:
      - ./ops/staging/Caddyfile:/etc/caddy/Caddyfile:ro
      - staging_caddy_data:/data/caddy
      - staging_caddy_config:/config/caddy
    tmpfs:
      - /tmp:exec
    depends_on:
      bot:
        condition: service_healthy
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: "3"
    healthcheck:
      test: ["CMD", "/tmp/caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  staging_caddy_data:
  staging_caddy_config:
