name: moroz-i-solntse-bot

services:
  test:
    profiles: ["test"]
    build:
      context: .
      dockerfile: Dockerfile.test
    env_file: ../.env
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:?set RABBITMQ_URL outside Git}
    volumes:
      - .:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  migrate:
    profiles: ["migration"]
    build:
      context: .
      dockerfile: Dockerfile.test
    env_file: ../.env
    command: ["alembic", "-c", "/workspace/alembic.ini", "upgrade", "head"]
    volumes:
      - .:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy

  cutover:
    profiles: ["migration"]
    build:
      context: .
      dockerfile: Dockerfile.test
    env_file: ../.env
    command:
      ["python", "/workspace/migrations/audit_existing_schema.py", "--config", "/workspace/alembic.ini"]
    volumes:
      - .:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL:?set RABBITMQ_URL outside Git}
    stop_grace_period: 30s
    depends_on:
      rabbitmq:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'python worker/main.py'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  scheduler:
    build:
      context: .
      dockerfile: scheduler/Dockerfile
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      rabbitmq:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'python scheduler/main.py'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  bot:
    build:
      context: .
      dockerfile: llm/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    stop_grace_period: 30s
    volumes:
      - ./llm/prompts:/app/prompts:rw
      - ./data:/app/data:ro
      - ./logs:/app/logs:rw
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'python bot.py'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    restart: unless-stopped
    env_file: ../.env
    stop_grace_period: 30s
    volumes:
      - ./llm/prompts:/app/prompts:rw
      - ./logs:/app/logs:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/login', timeout=3).status == 200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file: ../.env
    command: >
      sh -c '
      if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes;
      else
        exec redis-server --appendonly yes;
      fi'
    volumes:
      - redisdata:/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping || redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.3.2-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?set RABBITMQ_USER outside Git}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?set RABBITMQ_PASSWORD outside Git}
    volumes:
      - rabbitdata:/var/lib/rabbitmq
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  redisdata:
  pgdata:
  rabbitdata:
