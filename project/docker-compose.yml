name: moroz-i-solntse-bot

services:
  llm:
    build: ./llm
    restart: unless-stopped
    env_file: ../.env
    stop_grace_period: 30s
    volumes:
      - ./llm/prompts:/app/prompts:rw
      - ./data:/app/data:ro
      - ./logs:/app/logs:rw
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' < /proc/1/cmdline | grep -q 'python bot.py'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file: ../.env
    command: >
      sh -c '
      if [ -n "$$REDIS_PASSWORD" ]; then
        exec redis-server --requirepass "$$REDIS_PASSWORD" --appendonly yes;
      else
        exec redis-server --appendonly yes;
      fi'
    volumes:
      - redisdata:/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" --no-auth-warning ping || redis-cli ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ../.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redisdata:
  pgdata:
